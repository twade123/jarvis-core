<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Dashboard</title>
  <style>
/* ================================================================
   JARVIS WORKSPACE — Base Dashboard Template
   Palette: #0d1117 bg | #161b22 surface | #21262d border
            #58a6ff accent | #238636 green | #f85149 red | #d29922 amber
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface-2: #1c2128;
  --border:    #21262d;
  --border-2:  #30363d;
  --text:      #c9d1d9;
  --text-h:    #f0f6fc;
  --muted:     #7d8590;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --green-d:   #238636;
  --amber:     #d29922;
  --red:       #f85149;
  --purple:    #bc8cff;
  --sidebar-w: 248px;
  --header-h:  44px;
  --radius:    6px;
  --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono:      'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }
button { cursor: pointer; font-family: var(--font); }
input, textarea { font-family: var(--font); }
a { color: var(--accent); text-decoration: none; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* ── Views ── */
.view { display: none !important; }
.view.active { display: flex !important; }

/* ── Loading ── */
#loading-view { align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 1rem; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Login ── */
#login-view { align-items: center; justify-content: center; height: 100vh; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; margin: 1rem; }
.auth-card h1 { color: var(--text-h); font-size: 1.5rem; font-weight: 600; text-align: center; margin-bottom: 1.5rem; }
.form-group { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .875rem; }
.form-group label { font-size: .8rem; color: var(--muted); }
.form-group input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: .6rem .75rem; color: var(--text-h); font-size: .875rem; outline: none; transition: border-color .15s; }
.form-group input:focus { border-color: var(--accent); }
.btn-primary { width: 100%; background: var(--green-d); color: #fff; border: none; border-radius: var(--radius); padding: .65rem 1rem; font-size: .9rem; font-weight: 600; transition: background .15s; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.auth-error { color: var(--red); font-size: .8rem; min-height: 1.2em; margin-top: .5rem; }

/* ── App Layout ── */
#app-view { flex-direction: row; height: 100vh; }

/* Sidebar */
#sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
.sidebar-header { height: var(--header-h); display: flex; align-items: center; padding: 0 .875rem; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: .5rem; }
.sidebar-logo { font-weight: 700; font-size: .95rem; color: var(--text-h); flex: 1; letter-spacing: .04em; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
.conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.section-label { padding: .75rem .875rem .35rem; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.nav-list { flex: 1; overflow-y: auto; padding-bottom: .5rem; }
.nav-item { display: flex; align-items: center; gap: .6rem; padding: .45rem .875rem; color: var(--muted); font-size: .85rem; cursor: pointer; border-left: 2px solid transparent; transition: all .12s; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
.nav-item.active { color: var(--text-h); background: rgba(88,166,255,.08); border-left-color: var(--accent); }
.sidebar-user { border-top: 1px solid var(--border); padding: .75rem .875rem; display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }

/* Main Content */
#main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#main-header { height: var(--header-h); display: flex; align-items: center; padding: 0 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
#main-header h2 { color: var(--text-h); font-size: 1rem; font-weight: 600; }
#panels { flex: 1; overflow-y: auto; padding: 1.25rem; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }
.panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.panel-card h3 { color: var(--text-h); font-size: .9rem; font-weight: 600; margin-bottom: .5rem; }

/* Agent Card */
.agent-card { display: flex; align-items: center; gap: .75rem; padding: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; }
.agent-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: .85rem; }
.agent-name { color: var(--text-h); font-weight: 600; font-size: .85rem; }
.agent-role { color: var(--muted); font-size: .75rem; }
.agent-status { margin-left: auto; }

/* Activity Feed */
.activity-item { padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
.activity-item:last-child { border-bottom: none; }
.activity-time { color: var(--muted); font-size: .75rem; }
.activity-agent { color: var(--accent); font-weight: 600; }

/* Responsive */
@media (max-width: 768px) {
  #sidebar { display: none; }
  :root { --sidebar-w: 0px; }
}
  </style>
</head>
<body>

<!-- Loading View -->
<div id="loading-view" class="view active">
  <div class="spinner"></div>
  <div style="color: var(--muted); font-size: .85rem;">Connecting to workspace...</div>
</div>

<!-- Login View -->
<div id="login-view" class="view">
  <div class="auth-card">
    <h1>Workspace Dashboard</h1>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="auth-error" id="login-error"></div>
  </div>
</div>

<!-- Main App View -->
<div id="app-view" class="view">
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">WORKSPACE</span>
      <span class="conn-dot" id="conn-dot"></span>
    </div>
    <div class="section-label">Navigation</div>
    <div class="nav-list" id="nav-list">
      <div class="nav-item active" data-panel="dashboard" onclick="showPanel('dashboard')">Dashboard</div>
      <div class="nav-item" data-panel="agents" onclick="showPanel('agents')">Agent Team</div>
      <div class="nav-item" data-panel="tasks" onclick="showPanel('tasks')">Tasks</div>
      <div class="nav-item" data-panel="activity" onclick="showPanel('activity')">Activity Feed</div>
    </div>
    <div class="sidebar-user">
      <span style="color: var(--text-h); font-size: .85rem;" id="user-name">Tim</span>
    </div>
  </div>

  <div id="main-content">
    <div id="main-header">
      <h2 id="panel-title">Dashboard</h2>
    </div>
    <div id="panels">
      <!-- Dashboard Panel -->
      <div id="panel-dashboard" class="panel active">
        <div class="panel-card">
          <h3>Workspace Status</h3>
          <div id="workspace-status" style="color: var(--muted);">Loading...</div>
        </div>
        <div class="panel-card">
          <h3>Recent Activity</h3>
          <div id="recent-activity">No activity yet.</div>
        </div>
      </div>
      <!-- Agents Panel -->
      <div id="panel-agents" class="panel">
        <div id="agent-list">Loading agents...</div>
      </div>
      <!-- Tasks Panel -->
      <div id="panel-tasks" class="panel">
        <div class="panel-card">
          <h3>Create Task</h3>
          <div class="form-group">
            <input type="text" id="task-title" placeholder="Task title...">
          </div>
          <button class="btn-primary" onclick="createTask()" style="width:auto; padding: .5rem 1rem;">Create</button>
        </div>
        <div id="task-list">No tasks.</div>
      </div>
      <!-- Activity Panel -->
      <div id="panel-activity" class="panel">
        <div id="activity-feed">Loading activity...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
//  STATE
// ================================================================
const S = {
  token:       localStorage.getItem('ws_token'),
  user:        JSON.parse(localStorage.getItem('ws_user') || 'null'),
  workspaceId: null,
  eventSource: null,
  connected:   false,
};

// ================================================================
//  HELPERS
// ================================================================
async function api(path, opts) {
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'token=' + (S.token || '');
  const res = await fetch(url, opts || {});
  if (!res.ok) throw new Error('API ' + res.status);
  return res.json();
}

function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var panel = document.getElementById('panel-' + name);
  var nav = document.querySelector('.nav-item[data-panel="' + name + '"]');
  if (panel) panel.classList.add('active');
  if (nav) nav.classList.add('active');
  document.getElementById('panel-title').textContent =
    nav ? nav.textContent : name.charAt(0).toUpperCase() + name.slice(1);
}

// Safe DOM builder for agent cards
function buildAgentCard(name, info) {
  var card = document.createElement('div');
  card.className = 'agent-card';

  var icon = document.createElement('div');
  icon.className = 'agent-icon';
  icon.textContent = info.icon || name[0].toUpperCase();

  var details = document.createElement('div');
  var nameEl = document.createElement('div');
  nameEl.className = 'agent-name';
  nameEl.textContent = name;
  var roleEl = document.createElement('div');
  roleEl.className = 'agent-role';
  roleEl.textContent = info.role;
  details.appendChild(nameEl);
  details.appendChild(roleEl);

  var status = document.createElement('div');
  status.className = 'agent-status';
  var dot = document.createElement('span');
  dot.className = 'conn-dot live';
  dot.style.width = '6px';
  dot.style.height = '6px';
  status.appendChild(dot);

  card.appendChild(icon);
  card.appendChild(details);
  card.appendChild(status);
  return card;
}

// Safe DOM builder for activity items
function buildActivityItem(agent, action, ts) {
  var item = document.createElement('div');
  item.className = 'activity-item';

  var agentSpan = document.createElement('span');
  agentSpan.className = 'activity-agent';
  agentSpan.textContent = agent;

  var text = document.createTextNode(' ' + action);

  var timeDiv = document.createElement('div');
  timeDiv.className = 'activity-time';
  timeDiv.textContent = ts ? new Date(ts * 1000).toLocaleTimeString() : 'now';

  item.appendChild(agentSpan);
  item.appendChild(text);
  item.appendChild(timeDiv);
  return item;
}

// ================================================================
//  AUTH
// ================================================================
function doLogin() {
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value;
  if (!user) return;
  S.token = btoa(user + ':' + pass);
  S.user = { name: user };
  localStorage.setItem('ws_token', S.token);
  localStorage.setItem('ws_user', JSON.stringify(S.user));
  boot();
}

// ================================================================
//  SSE
// ================================================================
function connectSSE() {
  if (S.eventSource) S.eventSource.close();
  S.eventSource = new EventSource('/api/stream?token=' + (S.token || ''));

  S.eventSource.onopen = function() {
    S.connected = true;
    document.getElementById('conn-dot').classList.add('live');
  };

  S.eventSource.onerror = function() {
    S.connected = false;
    document.getElementById('conn-dot').classList.remove('live');
    setTimeout(connectSSE, 3000);
  };

  S.eventSource.addEventListener('agent_activity', function(e) {
    var data = JSON.parse(e.data);
    addActivityItem(data.agent, data.action, data.timestamp);
  });

  S.eventSource.addEventListener('task_update', function(e) {
    var data = JSON.parse(e.data);
    addActivityItem('system', 'Task "' + data.title + '" ' + data.status, data.timestamp);
  });
}

// ================================================================
//  DATA LOADING
// ================================================================
async function loadAgents() {
  try {
    var agents = await api('/api/agents');
    var el = document.getElementById('agent-list');
    el.textContent = '';
    for (var name in agents) {
      el.appendChild(buildAgentCard(name, agents[name]));
    }
  } catch (e) {
    document.getElementById('agent-list').textContent = 'Failed to load agents.';
  }
}

async function loadHealth() {
  try {
    var h = await api('/api/health');
    var el = document.getElementById('workspace-status');
    el.textContent = '';
    var statusSpan = document.createElement('span');
    statusSpan.style.color = 'var(--green)';
    statusSpan.textContent = h.status;
    el.appendChild(document.createTextNode('Status: '));
    el.appendChild(statusSpan);
    el.appendChild(document.createTextNode(' | Agents: ' + h.agents + ' | Updated: ' + new Date(h.timestamp).toLocaleTimeString()));
  } catch (e) {
    document.getElementById('workspace-status').textContent = 'Offline';
  }
}

function addActivityItem(agent, action, ts) {
  var item = buildActivityItem(agent, action, ts);
  var feed = document.getElementById('activity-feed');
  var recent = document.getElementById('recent-activity');
  feed.insertBefore(item, feed.firstChild);
  recent.insertBefore(item.cloneNode(true), recent.firstChild);
}

async function createTask() {
  var title = document.getElementById('task-title').value.trim();
  if (!title) return;
  try {
    await api('/api/task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, workspace_id: S.workspaceId })
    });
    document.getElementById('task-title').value = '';
  } catch (e) {
    alert('Failed to create task: ' + e.message);
  }
}

// ================================================================
//  BOOT
// ================================================================
async function boot() {
  showView('loading-view');
  if (!S.token && (location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    S.token = 'local-dev';
    S.user = { name: 'Tim' };
    localStorage.setItem('ws_token', S.token);
    localStorage.setItem('ws_user', JSON.stringify(S.user));
  }
  if (!S.token) return showView('login-view');
  try {
    var config = await api('/api/config');
    S.workspaceId = config.workspace_id;
    document.querySelector('.sidebar-logo').textContent = config.workspace_name || 'WORKSPACE';
    document.getElementById('user-name').textContent = S.user ? S.user.name : 'User';
    connectSSE();
    await Promise.all([loadAgents(), loadHealth()]);
    showView('app-view');
  } catch (e) {
    showView('login-view');
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
